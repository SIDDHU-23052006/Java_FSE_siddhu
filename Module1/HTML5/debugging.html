<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Debugging Example</title>

    <script>

        let number = 10;

        console.log("Number value is :", number);

        function test(){

            let result = number * 5;

            console.log("Result :", result);

            debugger;

            alert(result);
        }

    </script>
</head>
<body>

<button onclick="test()">
    Click Here
</button>

</body>
</html>
