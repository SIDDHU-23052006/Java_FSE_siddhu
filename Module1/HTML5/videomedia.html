<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Video Invite</title>

    <script>

        function videoReady(){
            document.getElementById("msg").innerHTML =
            "Video ready to play";
        }

        window.onbeforeunload = function(){
            return "Your form is not completed";
        }

    </script>
</head>
<body>

<video width="500" controls oncanplay="videoReady()">
    <source src="promo.mp4" type="video/mp4">
</video>

<p id="msg"></p>

</body>
</html>
